name: Release

# Запускается при создании тега вида v1.0.0, v2.3.1 и т.д.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # нужно для создания Release и загрузки assets

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: python build.py

      - name: Zip .app
        run: |
          cd dist
          zip -r "../AudioBook-Maker-macOS-${{ github.ref_name }}.zip" "AudioBook Maker.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: "AudioBook-Maker-macOS-${{ github.ref_name }}.zip"

  # ── Windows ────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: choco install ffmpeg --yes

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: python build.py

      - name: Rename exe
        shell: pwsh
        run: |
          Rename-Item "dist\AudioBook Maker.exe" "AudioBook-Maker-Windows-${{ github.ref_name }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: "dist/AudioBook-Maker-Windows-${{ github.ref_name }}.exe"

  # ── Linux ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg libglib2.0-0 libgl1 libegl1 \
            libfontconfig1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: python build.py

      - name: Rename binary
        run: |
          mv "dist/AudioBook Maker" "dist/AudioBook-Maker-Linux-${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: "dist/AudioBook-Maker-Linux-${{ github.ref_name }}"

  # ── Создание GitHub Release со всеми артефактами ───────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AudioBook Maker ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## AudioBook Maker ${{ github.ref_name }}

            Конвертирует MP3/M4A/FLAC/WAV → M4B аудиокнигу с главами и обложкой.
            Нативно открывается в Apple Books на iPhone/iPad.

            ### Скачать

            | Платформа | Файл |
            |-----------|------|
            | macOS | `AudioBook-Maker-macOS-${{ github.ref_name }}.zip` |
            | Windows | `AudioBook-Maker-Windows-${{ github.ref_name }}.exe` |
            | Linux | `AudioBook-Maker-Linux-${{ github.ref_name }}` |

            ### Системные требования

            - macOS 12+, Windows 10+, Ubuntu 22.04+
            - ffmpeg **встроен** — ничего устанавливать не нужно
          files: |
            release-assets/*
